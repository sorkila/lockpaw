name: Bevaka
options:
  bundleIdPrefix: com.eriknielsen
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Bevaka:
    type: application
    platform: macOS
    sources:
      - path: Bevaka
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eriknielsen.bevaka
        PRODUCT_NAME: Bevaka
        INFOPLIST_FILE: Bevaka/Info.plist
        CODE_SIGN_ENTITLEMENTS: Bevaka/Bevaka.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
